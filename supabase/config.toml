# Supabase CLI project config (minimal). `supabase start` runs a local stack;
# the test suite only needs the Postgres it exposes on 54322.
project_id = "cartpool"

[api]
enabled = true
port = 54321
# `api` is the client-facing RPC surface (0004_auth.sql) and is listed first so
# unqualified RPC names resolve there; `public` stays exposed for RLS-guarded
# table reads and Realtime subscriptions.
schemas = ["api", "public"]
extra_search_path = ["public"]

[db]
port = 54322
major_version = 15

[auth]
enable_signup = true

[auth.sms]
enable_signup = true
enable_confirmations = true

# Local dev email sign-in (DEV_EMAIL_AUTH in app/src/config.ts). The stock
# template sends a magic link pointing at a web app this project doesn't have;
# the app verifies a 6-digit OTP instead, so the template prints the token.
[auth.email.template.magic_link]
subject = "Your Cartpool sign-in code"
content_path = "./supabase/templates/magic_link.html"
